<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virgílio Valente | Lugares para Viver</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    font-family:Georgia, serif;
    overflow:hidden;
}

body{
    background:#111;
    color:white;
}

.slide{
    position:fixed;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:opacity 2.5s ease-in-out;
}

.slide.active{
    opacity:1;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.28);
}

.content{
    position:absolute;
    left:8%;
    top:50%;
    transform:translateY(-50%);
    z-index:10;
    max-width:600px;
}

h1{
    font-size:56px;
    font-weight:300;
    margin:0;
    letter-spacing:2px;
}

h2{
    font-weight:300;
    font-size:28px;
    margin:20px 0;
}

p{
    font-size:22px;
    line-height:1.6;
    color:#f2f2f2;
}

.button{
    display:inline-block;
    margin-top:35px;
    padding:15px 35px;
    border:1px solid white;
    color:white;
    text-decoration:none;
    transition:.4s;
}

.button:hover{
    background:white;
    color:black;
}
</style>
</head>

<body>

<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');">
<div class="overlay"></div>
</div>

<div class="content">

<h1>Virgílio Valente</h1>

<h2 id="title">Lugares para Viver</h2>

<p id="phrase">
Porque uma casa não se escolhe apenas pelas paredes.<br>
Escolhe-se pela vida que permite viver.
</p>

<a class="button" href="#">Entrar</a>

</div>

</body>
</html>
